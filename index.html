<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppsFlyer S2S Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --danger: #ff4d6d;
    --warn: #f59e0b;
    --card: #13131c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,160,0.08), transparent),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(124,58,237,0.07), transparent);
  }

  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px var(--accent); }
    50% { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,229,160,0.3); }
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .tag {
    margin-left: auto;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    letter-spacing: 0.1em;
  }

  /* TABS */
  .tab-bar {
    display: flex;
    gap: 0;
    margin: 1.5rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    margin-bottom: -1px;
    transition: all 0.15s;
    position: relative;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-badge {
    display: inline-block;
    background: var(--accent);
    color: #050a07;
    font-size: 0.55rem;
    font-weight: 700;
    border-radius: 20px;
    padding: 0.1rem 0.4rem;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* SCHEDULER LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 1.5rem;
    max-width: 1100px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .field { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  input, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
  }
  select option { background: #1a1a28; }
  .platform-toggle { display: flex; gap: 0.5rem; }
  .platform-btn {
    flex: 1;
    padding: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .platform-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.08);
  }
  .timer-section {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .timer-inputs { display: flex; gap: 0.5rem; align-items: flex-end; }
  .timer-unit { flex: 1; text-align: center; }
  .timer-unit label { text-align: center; }
  .timer-unit input { text-align: center; font-size: 1.4rem; font-weight: 600; padding: 0.6rem; }
  .timer-colon { font-size: 1.6rem; color: var(--muted); padding-bottom: 0.5rem; font-family: 'IBM Plex Mono', monospace; }

  /* Clock */
  .clock-display { text-align: center; padding: 2rem 0 1.5rem; }
  .clock-ring { position: relative; width: 160px; height: 160px; margin: 0 auto 1.2rem; }
  .clock-ring svg { transform: rotate(-90deg); }
  .clock-ring .track { fill: none; stroke: var(--border); stroke-width: 6; }
  .clock-ring .progress {
    fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
    stroke-dasharray: 408; stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 6px var(--accent));
  }
  .clock-ring .progress.danger { stroke: var(--danger); filter: drop-shadow(0 0 6px var(--danger)); }
  .clock-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .clock-time { font-family: 'IBM Plex Mono', monospace; font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
  .clock-status { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }

  /* Queue (right panel) */
  .queue-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    position: relative; overflow: hidden;
  }
  .queue-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
  .queue-item.firing::before { background: var(--warn); animation: blink 0.4s ease infinite; }
  .queue-item.done::before { background: var(--muted); }
  .queue-item.failed::before { background: var(--danger); }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .qi-info { flex: 1; min-width: 0; }
  .qi-game { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .qi-event { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qi-tmpl { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--accent); }
  .qi-timer { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 600; min-width: 60px; text-align: right; }
  .qi-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0.2rem 0.3rem; border-radius: 4px; transition: color 0.15s; }
  .qi-remove:hover { color: var(--danger); }
  .qi-status { font-size: 0.65rem; letter-spacing: 0.08em; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .qi-status.firing { background: rgba(245,158,11,0.15); color: var(--warn); }
  .qi-status.done { background: rgba(0,229,160,0.1); color: var(--accent); }
  .qi-status.failed { background: rgba(255,77,109,0.1); color: var(--danger); }
  .qi-status.pending { background: rgba(124,58,237,0.1); color: #a78bfa; }

  /* Buttons */
  .btn-primary {
    width: 100%; padding: 0.85rem;
    background: var(--accent); color: #050a07;
    border: none; border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; margin-top: 1rem;
  }
  .btn-primary:hover { background: #00ffa6; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,160,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { background: var(--muted); color: var(--bg); cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary {
    width: 100%; padding: 0.65rem;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; margin-top: 0.5rem;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  /* Log */
  .log-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem; height: 130px; overflow-y: auto;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; line-height: 1.6;
  }
  .log-line { margin-bottom: 0.15rem; }
  .log-line.success { color: var(--accent); }
  .log-line.error { color: var(--danger); }
  .log-line.info { color: var(--muted); }
  .log-line.warn { color: var(--warn); }

  .empty-queue { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; }
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
  .hint { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; font-family: 'IBM Plex Mono', monospace; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .right-panel { display: flex; flex-direction: column; gap: 1.5rem; }

  /* ===== TIMERS TAB ===== */
  .timers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem;
    max-width: 1100px;
  }

  .timer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.4rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .timer-card:hover { border-color: #2e2e44; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .timer-card.pending { border-left: 3px solid #7c3aed; }
  .timer-card.firing { border-left: 3px solid var(--warn); animation: cardPulse 0.5s ease infinite alternate; }
  .timer-card.done { border-left: 3px solid var(--accent); opacity: 0.6; }
  .timer-card.failed { border-left: 3px solid var(--danger); opacity: 0.7; }

  @keyframes cardPulse {
    from { box-shadow: 0 0 0 rgba(245,158,11,0); }
    to   { box-shadow: 0 0 20px rgba(245,158,11,0.2); }
  }

  .tc-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }
  .tc-game {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .tc-event {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .tc-tmpl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    margin-top: 0.2rem;
  }

  .tc-status-badge {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    font-weight: 700;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 0.5rem;
    margin-top: 0.1rem;
  }
  .tc-status-badge.pending { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .tc-status-badge.firing  { background: rgba(245,158,11,0.15); color: var(--warn); }
  .tc-status-badge.done    { background: rgba(0,229,160,0.12); color: var(--accent); }
  .tc-status-badge.failed  { background: rgba(255,77,109,0.12); color: var(--danger); }

  /* Progress bar */
  .tc-progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 0.9rem 0 0.7rem;
    overflow: hidden;
  }
  .tc-progress-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
    transition: width 1s linear;
  }
  .tc-progress-fill.danger { background: var(--danger); }
  .tc-progress-fill.done   { background: var(--muted); }
  .tc-progress-fill.failed { background: var(--danger); opacity: 0.5; }

  .tc-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tc-countdown {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .tc-countdown.danger { color: var(--danger); }
  .tc-countdown.done   { color: var(--muted); font-size: 1rem; }

  .tc-af-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    max-width: 120px;
  }

  .tc-remove {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.9rem; padding: 0.3rem;
    border-radius: 4px; transition: color 0.15s; line-height: 1;
  }
  .tc-remove:hover { color: var(--danger); }

  .timers-empty {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    grid-column: 1 / -1;
  }
  .timers-empty span { display: block; font-size: 2.5rem; margin-bottom: 0.8rem; opacity: 0.3; }

  .timers-toolbar {
    display: flex;
    gap: 0.8rem;
    max-width: 1100px;
    margin-bottom: 1.2rem;
    align-items: center;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.07); }
  .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
  .clear-done-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-done-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* AF ID group headers */
  .af-group { max-width: 1100px; margin-bottom: 2rem; }

  .af-group-header {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: 0.9rem;
    padding-bottom: 0.7rem;
    border-bottom: 1px solid var(--border);
  }
  .af-group-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent);
  }
  .af-group-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .af-group-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-left: 0.2rem;
  }
  .af-group-counts {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
  }
  .af-count-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
  }
  .af-count-pill.pending { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .af-count-pill.done    { background: rgba(0,229,160,0.1);   color: var(--accent); }
  .af-count-pill.failed  { background: rgba(255,77,109,0.1);  color: var(--danger); }

  .af-group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>AppsFlyer S2S Scheduler</h1>
  <span class="tag">S2S EVENT FIRE</span>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('scheduler')">Scheduler</button>
  <button class="tab-btn" id="tab_timers_btn" onclick="switchTab('timers')">Timers <span class="tab-badge" id="timers_badge">0</span></button>
</div>

<!-- ===== SCHEDULER TAB ===== -->
<div class="tab-panel active" id="tab_scheduler">
  <div class="layout">
    <div class="card">
      <div class="card-label">// Event Configuration</div>
      <div class="field-row">
        <div class="field">
          <label>AppsFlyer ID</label>
          <input id="af_id" type="text" placeholder="1234567890123-000000">
          <div class="hint">From AF dashboard or device</div>
        </div>
        <div class="field">
          <label>Customer User ID</label>
          <input id="customer_id" type="text" placeholder="optional override">
        </div>
      </div>
      <div class="field">
        <label>Platform</label>
        <div class="platform-toggle">
          <button class="platform-btn active" id="btn_ios" onclick="setPlatform('ios')">iOS</button>
          <button class="platform-btn" id="btn_android" onclick="setPlatform('android')">Android</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Game</label>
        <select id="game_select" onchange="onGameChange()">
          <option value="">— Select game —</option>
        </select>
      </div>
      <div class="field">
        <label>Event</label>
        <select id="event_select" disabled>
          <option value="">— Select game first —</option>
        </select>
      </div>
      <div id="event_preview" style="display:none; margin-top:0.5rem; padding:0.75rem; background:var(--bg); border:1px solid var(--border); border-radius:8px; font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--muted); line-height:1.7;"></div>
      <div class="timer-section">
        <div class="card-label">// Delay Timer</div>
        <div class="timer-inputs">
          <div class="timer-unit">
            <label>Hours</label>
            <input id="t_hours" type="number" min="0" max="23" value="0">
          </div>
          <div class="timer-colon">:</div>
          <div class="timer-unit">
            <label>Minutes</label>
            <input id="t_mins" type="number" min="0" max="59" value="0">
          </div>
          <div class="timer-colon">:</div>
          <div class="timer-unit">
            <label>Seconds</label>
            <input id="t_secs" type="number" min="0" max="59" value="30">
          </div>
        </div>
      </div>
      <button class="btn-primary" onclick="scheduleEvent()">⏱ Schedule Event</button>
      <button class="btn-secondary" onclick="fireNow()">⚡ Fire Immediately</button>
    </div>

    <div class="right-panel">
      <div class="card" style="text-align:center;">
        <div class="card-label" style="text-align:left">// Next Firing</div>
        <div class="clock-display">
          <div class="clock-ring">
            <svg viewBox="0 0 140 140" width="160" height="160">
              <circle class="track" cx="70" cy="70" r="65"/>
              <circle class="progress" id="ring_progress" cx="70" cy="70" r="65"/>
            </svg>
            <div class="clock-inner">
              <div class="clock-time" id="clock_display">--:--:--</div>
              <div class="clock-status" id="clock_label">no events scheduled</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="flex:1">
        <div class="card-label">// Scheduled Queue</div>
        <div id="queue_list"><div class="empty-queue">no events in queue</div></div>
      </div>

      <div class="card">
        <div class="card-label">// Event Log</div>
        <div class="log-box" id="log_box">
          <div class="log-line info">— ready —</div>
        </div>
        <button class="btn-secondary" onclick="clearLog()">clear log</button>
      </div>
    </div>
  </div>
</div>

let platform = 'ios';
let queue = [];
let nextId = 1;
let timerFilter = 'all';
let activeTab = 'scheduler';

window.onload = async () => {
  const sel = document.getElementById('game_select');
  Object.keys(GAMES).forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });
  await loadQueue();
  setInterval(tickAll, 1000);
  setInterval(renderTimersTab, 500);
  setInterval(updateClock, 200);
  setInterval(syncQueue, 5000);
};

// ===== TABS =====
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab_' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if (tab === 'timers') renderTimersTab();
}

// ===== PLATFORM =====
function setPlatform(p) {
  platform = p;
  document.getElementById('btn_ios').classList.toggle('active', p === 'ios');
  document.getElementById('btn_android').classList.toggle('active', p === 'android');
}

// ===== GAME / EVENT =====
function onGameChange() {
  const gameName = document.getElementById('game_select').value;
  const evSel = document.getElementById('event_select');
  evSel.innerHTML = '';
  document.getElementById('event_preview').style.display = 'none';
  if (!gameName) { evSel.innerHTML = '<option value="">— Select game first —</option>'; evSel.disabled = true; return; }
  const game = GAMES[gameName];
  evSel.disabled = false;
  const ph = document.createElement('option'); ph.value = ''; ph.textContent = '— Select event —';
  evSel.appendChild(ph);
  game.events.forEach((ev, i) => {
    const o = document.createElement('option'); o.value = i; o.textContent = ev.name;
    evSel.appendChild(o);
  });
  evSel.onchange = showEventPreview;
}

function showEventPreview() {
  const gameName = document.getElementById('game_select').value;
  const evIdx = document.getElementById('event_select').value;
  const preview = document.getElementById('event_preview');
  if (!gameName || evIdx === '') { preview.style.display = 'none'; return; }
  const game = GAMES[gameName];
  const ev = game.events[evIdx];
  const appId = platform === 'ios' ? game.ios : game.pkg;
  preview.style.display = 'block';
  preview.innerHTML = `<span style="color:#a78bfa">tmpl</span>: ${ev.tmpl}<br><span style="color:#a78bfa">app</span>: ${appId}<br>${Object.keys(ev.value).length ? `<span style="color:#a78bfa">value</span>: ${JSON.stringify(ev.value)}` : '<span style="color:var(--muted)">value: (empty)</span>'}`;
}

function getFormValues() {
  const af_id = document.getElementById('af_id').value.trim();
  const customer_id = document.getElementById('customer_id').value.trim();
  const gameName = document.getElementById('game_select').value;
  const evIdx = document.getElementById('event_select').value;
  const hours = parseInt(document.getElementById('t_hours').value) || 0;
  const mins  = parseInt(document.getElementById('t_mins').value)  || 0;
  const secs  = parseInt(document.getElementById('t_secs').value)  || 0;
  if (!af_id)    { alert('Enter an AppsFlyer ID'); return null; }
  if (!gameName) { alert('Select a game'); return null; }
  if (evIdx === '') { alert('Select an event'); return null; }
  return { af_id, customer_id, gameName, game: GAMES[gameName], event: GAMES[gameName].events[evIdx], totalSecs: hours*3600+mins*60+secs };
}

// ===== DATABASE SYNC =====
async function saveQueue() {
  try {
    await fetch('/api/db?action=set', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ queue })
    });
  } catch(e) { console.warn('Save failed', e); }
}

async function loadQueue() {
  try {
    const res = await fetch('/api/db?action=get');
    const data = await res.json();
    if (data.queue && Array.isArray(data.queue)) {
      queue = data.queue;
      if (queue.length) nextId = Math.max(...queue.map(i => i.id)) + 1;
      renderQueue();
      renderTimersTab();
      updateBadge();
      log(`Loaded ${queue.length} item(s) from database`, 'info');
    }
  } catch(e) { console.warn('Load failed', e); }
}

async function syncQueue() {
  // Pull latest from DB and merge — keeps all tabs in sync
  try {
    const res = await fetch('/api/db?action=get');
    const data = await res.json();
    if (data.queue && Array.isArray(data.queue)) {
      // Only update items we don't have locally (added from another tab)
      const localIds = new Set(queue.map(i => i.id));
      const newItems = data.queue.filter(i => !localIds.has(i.id));
      if (newItems.length) {
        queue = [...queue, ...newItems];
        renderQueue();
        renderTimersTab();
        updateBadge();
        log(`Synced ${newItems.length} new item(s) from another session`, 'info');
      }
    }
  } catch(e) {}
}

// ===== SCHEDULE =====
function scheduleEvent() {
  const v = getFormValues();
  if (!v) return;
  if (v.totalSecs === 0) { fireNow(); return; }
  const item = {
    id: nextId++,
    af_id: v.af_id,
    customer_id: v.customer_id,
    gameName: v.gameName,
    game: v.game,
    event: v.event,
    totalSecs: v.totalSecs,
    remaining: v.totalSecs,
    status: 'pending'
  };
  queue.push(item);
  renderQueue();
  updateBadge();
  saveQueue();
  log(`Scheduled: [${v.gameName}] ${v.event.name} in ${fmtSecs(v.totalSecs)}`, 'info');
}

function fireNow() {
  const v = getFormValues();
  if (!v) return;
  doFire(v.af_id, v.customer_id, v.game, v.event, v.gameName, null);
}

// ===== TICK =====
function tickAll() {
  queue.forEach(item => {
    if (item.status !== 'pending') return;
    item.remaining--;
    if (item.remaining <= 0) {
      item.status = 'firing';
      doFire(item.af_id, item.customer_id, item.game, item.event, item.gameName, item);
    }
  });
  renderQueue();
  updateBadge();
}

async function doFire(af_id, customer_id, game, event, gameName, queueItem) {
  const appId = platform === 'ios' ? game.ios : game.pkg;
  const now = new Date().toISOString().replace('T',' ').replace('Z','').slice(0,23);
  const payload = {
    appsflyer_id: af_id,
    customer_user_id: customer_id || "",
    eventName: event.tmpl,
    eventCurrency: "USD",
    eventValue: Object.keys(event.value).length ? JSON.stringify(event.value) : "",
    eventTime: now
  };
  log(`→ Firing [${gameName}] ${event.tmpl} | af_id: ${af_id}`, 'warn');
  try {
    const res = await fetch(`/api/proxy?appId=${appId}`, {
      method: 'POST',
      headers: { 'authentication': game.key, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    if (res.ok || res.status === 200) {
      log(`✓ [${res.status}] ${gameName} → ${event.tmpl} fired OK`, 'success');
      if (queueItem) { queueItem.status = 'done'; renderQueue(); updateBadge(); saveQueue(); }
    } else {
      log(`✗ [${res.status}] ${gameName} → ${event.tmpl}: ${text.slice(0,120)}`, 'error');
      if (queueItem) { queueItem.status = 'failed'; renderQueue(); updateBadge(); saveQueue(); }
    }
  } catch (err) {
    log(`✗ Network error: ${err.message}`, 'error');
    if (queueItem) { queueItem.status = 'failed'; renderQueue(); updateBadge(); saveQueue(); }
  }
}

function removeItem(id) {
  queue = queue.filter(i => i.id !== id);
  renderQueue();
  updateBadge();
  renderTimersTab();
  saveQueue();
}

// ===== QUEUE (right sidebar) =====
function renderQueue() {
  const el = document.getElementById('queue_list');
  if (queue.length === 0) { el.innerHTML = '<div class="empty-queue">no events in queue</div>'; return; }
  el.innerHTML = queue.map(item => `
    <div class="queue-item ${item.status}">
      <div class="qi-info">
        <div class="qi-game">${item.gameName}</div>
        <div class="qi-event">${item.event.name}</div>
        <div class="qi-tmpl">${item.event.tmpl}</div>
      </div>
      <span class="qi-status ${item.status}">${item.status}</span>
      ${item.status === 'pending' ? `<div class="qi-timer">${fmtSecs(item.remaining)}</div>` : ''}
      <button class="qi-remove" onclick="removeItem(${item.id})">×</button>
    </div>
  `).join('');
}

// ===== TIMERS TAB =====
function setFilter(f) {
  timerFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter_' + f).classList.add('active');
  renderTimersTab();
}

function clearFinished() {
  queue = queue.filter(i => i.status === 'pending' || i.status === 'firing');
  renderQueue();
  updateBadge();
  renderTimersTab();
}

function timerCardHTML(item) {
  const pct = item.totalSecs > 0 ? Math.max(0, item.remaining / item.totalSecs * 100) : 0;
  const isDanger = item.remaining <= 10 && item.status === 'pending';
  const fillClass = item.status === 'done' ? 'done' : item.status === 'failed' ? 'failed' : isDanger ? 'danger' : '';
  const countdownClass = item.status === 'done' ? 'done' : isDanger ? 'danger' : '';
  const countdownText = item.status === 'done' ? 'FIRED' : item.status === 'failed' ? 'FAILED' : item.status === 'firing' ? 'SENDING…' : fmtSecs(item.remaining);
  return `
    <div class="timer-card ${item.status}">
      <div class="tc-top">
        <div>
          <div class="tc-game">${item.gameName}</div>
          <div class="tc-event">${item.event.name}</div>
          <div class="tc-tmpl">${item.event.tmpl}</div>
        </div>
        <span class="tc-status-badge ${item.status}">${item.status}</span>
      </div>
      <div class="tc-progress-track">
        <div class="tc-progress-fill ${fillClass}" style="width:${item.status==='done'||item.status==='failed'?100:pct}%"></div>
      </div>
      <div class="tc-bottom">
        <div class="tc-countdown ${countdownClass}">${countdownText}</div>
        <button class="tc-remove" onclick="removeItem(${item.id})" title="Remove">✕</button>
      </div>
    </div>
  `;
}

function renderTimersTab() {
  const container = document.getElementById('timers_grid');
  let filtered = timerFilter === 'all' ? queue : queue.filter(i => i.status === timerFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="timers-empty" style="padding:5rem 2rem;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;letter-spacing:0.05em"><span style="display:block;font-size:2.5rem;margin-bottom:0.8rem;opacity:0.3">⏱</span>${timerFilter === 'all' ? 'No timers yet — schedule an event first' : 'No ' + timerFilter + ' timers'}</div>`;
    return;
  }

  // Group by af_id, preserving insertion order
  const groups = {};
  filtered.forEach(item => {
    if (!groups[item.af_id]) groups[item.af_id] = [];
    groups[item.af_id].push(item);
  });

  container.innerHTML = Object.entries(groups).map(([afId, items]) => {
    const nPending = items.filter(i => i.status === 'pending' || i.status === 'firing').length;
    const nDone    = items.filter(i => i.status === 'done').length;
    const nFailed  = items.filter(i => i.status === 'failed').length;

    const pills = [
      nPending ? `<span class="af-count-pill pending">${nPending} pending</span>` : '',
      nDone    ? `<span class="af-count-pill done">${nDone} done</span>`       : '',
      nFailed  ? `<span class="af-count-pill failed">${nFailed} failed</span>` : '',
    ].join('');

    return `
      <div class="af-group">
        <div class="af-group-header">
          <div class="af-group-dot"></div>
          <div>
            <div class="af-group-id">${afId}</div>
            <div class="af-group-meta">${items.length} event${items.length !== 1 ? 's' : ''}</div>
          </div>
          <div class="af-group-counts">${pills}</div>
        </div>
        <div class="af-group-grid">
          ${items.map(timerCardHTML).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// ===== CLOCK =====
function updateClock() {
  const pending = queue.filter(i => i.status === 'pending').sort((a,b) => a.remaining - b.remaining);
  const display = document.getElementById('clock_display');
  const label   = document.getElementById('clock_label');
  const ring    = document.getElementById('ring_progress');
  const C = 408;
  if (pending.length === 0) {
    display.textContent = '--:--:--'; label.textContent = 'no events scheduled';
    ring.style.strokeDashoffset = 0; ring.classList.remove('danger'); return;
  }
  const next = pending[0];
  display.textContent = fmtSecs(next.remaining);
  label.textContent = next.event.tmpl;
  ring.style.strokeDashoffset = C * (1 - next.remaining / next.totalSecs);
  ring.classList.toggle('danger', next.remaining <= 10);
}

function updateBadge() {
  const active = queue.filter(i => i.status === 'pending' || i.status === 'firing').length;
  document.getElementById('timers_badge').textContent = active;
}

function fmtSecs(s) {
  if (s < 0) s = 0;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function log(msg, type='info') {
  const box = document.getElementById('log_box');
  const ts = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `[${ts}] ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  document.getElementById('log_box').innerHTML = '<div class="log-line info">— cleared —</div>';
}
